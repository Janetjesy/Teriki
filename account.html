<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account - Teriki Beauty</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <style>
        .account-hero {
            background-color: var(--bg-white);
            padding-top: 140px;
            padding-bottom: 50px;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-tabs .nav-link {
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-muted);
            font-size: 1.2rem;
            padding-bottom: 0.5rem;
            background: transparent;
        }

        .nav-tabs .nav-link:hover {
            border-color: transparent;
            color: var(--text-dark);
        }

        .nav-tabs .nav-link.active {
            border-color: var(--primary-dark);
            color: var(--text-dark);
            background: transparent;
            font-weight: 600;
        }

        .social-login-btn {
            border: 1px solid var(--border-color);
            background: white;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .social-login-btn:hover {
            background: var(--bg-white);
            transform: translateY(-2px);
        }

        .social-login-btn img {
            width: 20px;
            height: 20px;
            margin-right: 10px;
        }
    </style>
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="img/favicon.png" alt="Teriki" width="28" height="28"
                    class="me-2 rounded-circle border border-1">
                TERIKI
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="shop.html">Shop All</a></li>
                    <li class="nav-item"><a class="nav-link" href="shop.html?category=lips">Lips</a></li>
                    <li class="nav-item"><a class="nav-link" href="shop.html?category=eyes">Eyes</a></li>
                    <li class="nav-item"><a class="nav-link" href="shop.html?category=face">Face</a></li>
                    <li class="nav-item"><a class="nav-link" href="shop.html?category=nails">Nails</a></li>
                    <li class="nav-item"><a class="nav-link" href="shop.html?category=tools">Tools & Brushes</a></li>
                </ul>
                <div class="d-flex align-items-center">
                    <a href="#" class="text-dark me-3" data-bs-toggle="modal" data-bs-target="#searchModal"
                        title="Search"><i class="bi bi-search"></i></a>
                    <a href="offers.html" class="me-3 position-relative" title="Offers & Deals" style="color:#e63946;">
                        <i class="bi bi-tag-fill fs-5"></i>
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                            style="font-size:0.55rem; padding:3px 5px;">SALE</span>
                    </a>
                    <a href="account.html" class="text-dark me-3"><i class="bi bi-person-fill"></i></a>
                    <a href="wishlist.html" class="me-3 wishlist-icon-nav" title="Wishlist">
                        <i class="bi bi-heart"></i>
                        <span class="wishlist-badge" id="wishlist-count">0</span>
                    </a>
                    <a href="cart.html" class="cart-icon">
                        <i class="bi bi-bag"></i>
                        <span class="cart-badge" id="cart-count">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <div class="account-hero text-center">
        <div class="container">
            <h1 class="font-heading display-4 fw-bold mb-3">Your Account</h1>
        </div>
    </div>

    <!-- Auth Forms -->
    <section class="section-padding py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-8">
                    <div class="bg-white p-4 p-md-5 rounded-4 shadow-sm border">

                        <!-- Nav Tabs -->
                        <ul class="nav nav-tabs border-0 flex-nowrap mb-4 justify-content-center gap-4" id="authTabs"
                            role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active font-heading" id="login-tab" data-bs-toggle="tab"
                                    data-bs-target="#login" type="button" role="tab" aria-controls="login"
                                    aria-selected="true">Sign In</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link font-heading" id="register-tab" data-bs-toggle="tab"
                                    data-bs-target="#register" type="button" role="tab" aria-controls="register"
                                    aria-selected="false">Create Account</button>
                            </li>
                        </ul>

                        <div class="tab-content" id="authTabsContent">
                            <!-- Login Form -->
                            <div class="tab-pane fade show active" id="login" role="tabpanel"
                                aria-labelledby="login-tab">
                                <form class="needs-validation" novalidate
                                    onsubmit="event.preventDefault(); window.location.href='index.html?toast=welcome';">
                                    <div class="mb-3">
                                        <label
                                            class="form-label small text-muted text-uppercase letter-spacing-1">Email</label>
                                        <input type="email" class="form-control p-3 rounded-pill"
                                            placeholder="Enter your email" required>
                                    </div>
                                    <div class="mb-4">
                                        <div class="d-flex justify-content-between">
                                            <label
                                                class="form-label small text-muted text-uppercase letter-spacing-1">Password</label>
                                            <a href="#" class="small text-decoration-underline text-muted">Forgot
                                                password?</a>
                                        </div>
                                        <input type="password" class="form-control p-3 rounded-pill"
                                            placeholder="Enter your password" required>
                                    </div>
                                    <button type="submit" class="btn btn-dark rounded-pill w-100 py-3 fw-bold mb-4">SIGN
                                        IN</button>
                                </form>

                                <div class="text-center mb-4">
                                    <span class="bg-white px-3 text-muted small position-relative z-1">or continue
                                        with</span>
                                    <hr class="mt-n2 z-0 position-relative">
                                </div>

                                <a href="#" class="social-login-btn mb-3">
                                    <i class="bi bi-google me-2 text-danger fs-5"></i>
                                    Google
                                </a>
                                <a href="#" class="social-login-btn">
                                    <i class="bi bi-facebook me-2 text-primary fs-5"></i>
                                    Facebook
                                </a>
                            </div>

                            <!-- Register Form -->
                            <div class="tab-pane fade" id="register" role="tabpanel" aria-labelledby="register-tab">
                                <form class="needs-validation" novalidate
                                    onsubmit="event.preventDefault(); window.location.href='index.html?toast=welcome';">
                                    <div class="row g-3 mb-3">
                                        <div class="col-6">
                                            <label
                                                class="form-label small text-muted text-uppercase letter-spacing-1">First
                                                Name</label>
                                            <input type="text" class="form-control p-3 rounded-pill" required>
                                        </div>
                                        <div class="col-6">
                                            <label
                                                class="form-label small text-muted text-uppercase letter-spacing-1">Last
                                                Name</label>
                                            <input type="text" class="form-control p-3 rounded-pill" required>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label
                                            class="form-label small text-muted text-uppercase letter-spacing-1">Email</label>
                                        <input type="email" class="form-control p-3 rounded-pill" required>
                                    </div>
                                    <div class="mb-4">
                                        <label
                                            class="form-label small text-muted text-uppercase letter-spacing-1">Password</label>
                                        <input type="password" class="form-control p-3 rounded-pill"
                                            placeholder="Min. 8 characters" required minlength="8">
                                    </div>
                                    <button type="submit"
                                        class="btn btn-dark rounded-pill w-100 py-3 fw-bold mb-4">CREATE
                                        ACCOUNT</button>
                                </form>

                                <div class="text-center text-muted small">
                                    By registering, you agree to our <a href="terms.html"
                                        class="text-dark text-decoration-underline">Terms of Service</a> & <a
                                        href="privacy.html" class="text-dark text-decoration-underline">Privacy
                                        Policy</a>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Search Modal -->
    <div class="modal fade" id="searchModal" tabindex="-1" aria-labelledby="searchModalLabel" aria-hidden="true">
        <!-- ... existing search modal code ... -->
    </div>

    <!-- Footer -->
    <footer class="footer mt-0">
        <!-- ... existing footer code ... -->
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App JS -->
    <script src="js/app.js"></script>
    <script>
        // Use custom native form validation from Bootstrap
        (() => {
            'use strict'
            const forms = document.querySelectorAll('.needs-validation')
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>
</body>

</html>
