<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Teriki Beauty</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/png" href="img/favicon.png">
</head>

<body class="bg-light">

    <!-- Simple Navigation for Checkout -->
    <nav class="navbar navbar-expand-lg border-bottom bg-white py-3">
        <div class="container justify-content-center">
            <a class="navbar-brand m-0 fs-3 d-flex align-items-center text-decoration-none" href="index.html">
                <img src="img/favicon.png" alt="Teriki" width="32" height="32"
                    class="me-2 rounded-circle border border-1">
                TERIKI
            </a>
        </div>
    </nav>

    <!-- Thank You Section -->
    <section class="section-padding py-5 d-flex align-items-center min-vh-100" style="margin-top: -80px;">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8 text-center">
                    <div class="bg-white p-5 rounded-4 shadow-sm">
                        <div class="mb-4">
                            <i class="bi bi-bag-heart-fill" style="font-size: 5rem; color: var(--primary-dark);"></i>
                        </div>
                        <h1 class="font-heading fw-bold mb-3 display-5">Thank You!</h1>
                        <p class="lead text-muted mb-5">Your order has been placed successfully. We are preparing it for
                            shipment and will email you the tracking details shortly.</p>

                        <div class="bg-light rounded p-4 mb-5 text-start">
                            <h5 class="font-heading mb-3">Order Summary</h5>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Order Number</span>
                                <span class="fw-bold">#TRK-902441</span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Date</span>
                                <span class="fw-bold" id="order-date">Today</span>
                            </div>
                            <div class="d-flex justify-content-between">
                                <span class="text-muted">Status</span>
                                <span class="badge bg-success rounded-pill fw-normal">Processing</span>
                            </div>
                        </div>

                        <a href="shop.html" class="btn btn-dark rounded-pill px-5 py-3 fw-bold w-100 mb-3">CONTINUE
                            SHOPPING</a>
                        <a href="index.html" class="text-muted text-decoration-underline small">Return to Homepage</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        document.addEventListener('terikiDataLoaded', () => {
            const today = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('order-date').textContent = today.toLocaleDateString('en-US', options);
        });
    </script>
</body>

</html>
